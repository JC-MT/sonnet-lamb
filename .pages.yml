media:
  name: Images
  input: src/assets/doula
  output: src/assets/doula
  commit:
    templates:
      create: "chore(media): add {filename}"
      update: "chore(media): update {filename}"
      delete: "chore(media): remove {filename}"
      rename: "chore(media): rename {oldFilename} -> {newFilename}"
content:
  - name: posts
    label: Posts
    type: collection
    path: src/posts
    fields:
      - name: title
        type: string
      - name: body
        type: rich-text
  - name: site
    label: Site settings
    type: file
    path: src/_data/site.json
    fields:
      - name: title
        type: string
      - name: description
        type: text
      - name: url
        type: string
actions:
  - name: deploy-site
    label: Deploy site
    workflow: pages-cms-action.yml